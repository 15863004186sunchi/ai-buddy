<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-background": "#303330",

              "on-secondary-fixed-variant": "#785342",

              "on-surface-variant": "#5d605c",
              "surface": "#faf9f6",
              "primary-fixed": "#a190f5",
              "inverse-surface": "#0d0f0d",
              "on-primary-fixed": "#000000",
              "secondary-container": "#ffdbcc",
              "on-primary-container": "#20006e",
              "on-secondary-container": "#6d4939",
              "on-primary": "#fcf7ff",
              "background": "#faf9f6",
              "on-tertiary-container": "#2b6358",
              "error-container": "#f97386",

            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #6150b0 0%, #a190f5 100%);
        }
        .glass-panel {
            background: rgba(225, 227, 222, 0.6);
            backdrop-filter: blur(20px);
        }
        .ethereal-glow {
            box-shadow: 0 8px 32px rgba(48, 51, 48, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="bg-transparent font-['Plus_Jakarta_Sans'] font-bold text-xl w-full top-0 left-0 absolute flex items-center justify-between px-6 py-4 z-50">
<div class="flex items-center gap-2 text-violet-600 dark:text-violet-300 tracking-tight font-extrabold">
<span class="material-symbols-outlined">spa</span>
<span>灵动共鸣</span>
</div>
</header>
<main class="relative h-screen w-full flex flex-col items-center justify-center px-8">
<!-- Hero Illustration Area (Asymmetric Layout) -->
<div class="relative w-full max-w-md aspect-square mb-12 flex items-center justify-center">
<!-- Background "Cloud" shapes using Tonal Depth -->
<div class="absolute top-0 -left-4 w-64 h-64 bg-tertiary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
<div class="absolute bottom-4 -right-4 w-72 h-72 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
<!-- Main Illustration Card -->
<div class="relative z-10 w-full h-full rounded-xl overflow-hidden surface-container-lowest ethereal-glow">
<img alt="Journaling with soft lighting" class="w-full h-full object-cover" data-alt="Soft light on an open journal with ethereal clouds and floating sparkles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDRJpqu6X8KIFWNmAo0mAS6alYw58FOmHuiTg6862fT0hY_mR6NBdNM5ylecEOl5pz8gHq464T84rCx7SE-Pg9vKHNd9Y6lFd2h6b3QkXH9z9rgwXG5kdt5ZkNcom4LXaMfKJRweqQhxICHQnPSe1_vU6UCMyg4FCoM1Supvy0LHcZoD7Gp313ADIe6qEebCMw7gIAZwqIdeYs5ZQ0wsIgy_W-wGiZF5NQSib25U133zhBgnYHbLLWQ8yj1suGo0HZX06113V_p6NkE"/>
<!-- Floating Glass Element (Intentional Asymmetry) -->
<div class="absolute bottom-6 left-6 right-6 glass-panel p-4 rounded-lg flex items-center gap-4 border border-white/20">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">edit_note</span>
</div>
<div>
<div class="text-xs font-headline font-bold text-primary">当前心情</div>
<div class="text-sm font-body text-on-surface-variant">正如轻云般自在...</div>
</div>
</div>
</div>
<!-- Decorative "Reflection Orb" -->
<div class="absolute -top-6 -right-6 w-24 h-24 signature-gradient rounded-full opacity-20 blur-xl"></div>
</div>
<!-- Copywriting Section -->
<div class="text-center space-y-4 max-w-sm mb-16">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">
                情绪记录 - <span class="text-primary">见证成长</span>
</h1>
<p class="font-body text-on-surface-variant leading-relaxed px-4">
                记录每一次心智蜕变。通过智能情绪分析，洞察那个最真实的自己。
            </p>
</div>
<!-- Action Area -->
<div class="w-full max-w-xs space-y-8 flex flex-col items-center">
<!-- CTA Button -->
<button class="signature-gradient w-full py-4 px-8 rounded-full text-on-primary font-headline font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity active:scale-95 duration-200">
                开启心灵旅程
            </button>
<!-- Pagination Dots (Shared Component Style) -->
<nav class="fixed bottom-12 left-0 w-full z-50 flex justify-center items-center gap-4">
<div class="w-2.5 h-2.5 rounded-full bg-violet-200 dark:bg-violet-800 transition-all duration-300"></div>
<div class="w-4 h-2.5 rounded-full bg-violet-600 dark:text-violet-300 scale-125 transition-all duration-300"></div>
<div class="w-2.5 h-2.5 rounded-full bg-violet-200 dark:bg-violet-800 transition-all duration-300"></div>
</nav>
</div>
</main>
<!-- Background Accents -->
<div class="fixed top-0 right-0 -z-10 w-96 h-96 bg-primary-container opacity-10 rounded-full blur-[120px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-80 h-80 bg-tertiary-container opacity-10 rounded-full blur-[100px]"></div>
</body></html>
