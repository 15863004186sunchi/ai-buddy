<header class="w-full top-0 z-50 flex items-center justify-between px-6 py-4 bg-[#faf9f6] dark:bg-slate-950">
<button class="p-2 hover:bg-[#eeeeea] dark:hover:bg-slate-800 transition-colors rounded-full flex items-center justify-center">

<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] orb-gradient rounded-full"></div>

<!-- Main Registration Container -->

<div class="text-center mb-10 w-full">
<h1 class="text-[2.25rem] leading-tight font-extrabold text-on-surface tracking-tight mb-3">立即注册</h1>
<p class="text-on-surface-variant text-base font-medium opacity-80 max-w-[280px] mx-auto">
                开启您的心灵旅程，让每一份情绪都有归宿。
            </p>
</div>
<!-- Registration Form Card -->
<div class="w-full surface-container-lowest bg-white/40 glass-card rounded-xl p-8 shadow-[0_8px_32px_0_rgba(48,51,48,0.03)] border border-white/20">
<form class="space-y-6">
<!-- Username -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-2">用户名</label>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-on-surface-variant/50">
<span class="material-symbols-outlined text-lg" data-icon="person">person</span>
</div>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/40 text-on-surface font-medium transition-all" placeholder="输入您的昵称" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-2">电子邮箱</label>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-on-surface-variant/50">
<span class="material-symbols-outlined text-lg" data-icon="mail">mail</span>
</div>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/40 text-on-surface font-medium transition-all" placeholder="example@email.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-2">设置密码</label>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-on-surface-variant/50">
<span class="material-symbols-outlined text-lg" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/40 text-on-surface font-medium transition-all" placeholder="至少8位字符" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant/30 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-2">确认密码</label>
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-on-surface-variant/50">
<span class="material-symbols-outlined text-lg" data-icon="lock_clock">lock_clock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/40 text-on-surface font-medium transition-all" placeholder="再次输入密码" type="password"/>
</div>
</div>
<!-- CTA -->
<div class="pt-4">
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200" type="submit">
                        立即注册
                    </button>
</div>
<!-- Legal Text -->
<p class="text-center text-xs leading-relaxed text-on-surface-variant/60 px-4">
                    点击注册即表示您同意<a class="text-primary hover:underline font-medium" href="#">《用户协议》</a>与<a class="text-primary hover:underline font-medium" href="#">《隐私政策》</a>
</p>
</form>
</div>

<footer class="mt-12 text-center">
